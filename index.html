<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Quest</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0818;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;}
#wrap{position:relative;width:680px;max-width:100vw;}
canvas{display:block;width:100%;border-radius:10px;border:2px solid #2a2460;}
#hud{position:absolute;top:10px;left:0;width:100%;display:flex;justify-content:space-between;padding:0 14px;pointer-events:none;}
.hi{background:rgba(0,0,0,0.6);color:#fff;font-size:13px;padding:4px 10px;border-radius:6px;}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,8,24,0.9);border-radius:8px;}
#overlay h2{color:#f0c040;font-size:26px;margin-bottom:10px;letter-spacing:2px;}
#overlay p{color:#aaa;font-size:13px;margin:3px 0;}
#startBtn{margin-top:18px;background:#f0c040;color:#1a1a2e;border:none;padding:11px 36px;font-size:15px;font-family:monospace;font-weight:700;border-radius:8px;cursor:pointer;letter-spacing:1px;}
#startBtn:hover{background:#ffd84d;}
#controls{display:flex;justify-content:center;gap:10px;margin-top:10px;}
.cb{width:54px;height:54px;background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.25);border-radius:10px;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;touch-action:none;}
.cb:active{background:rgba(255,255,255,0.25);}
</style>
</head>

<div id="wrap">
  <canvas id="c" width="680" height="340"></canvas>

  </div>

    <h2>PIXEL QUEST</h2>

    <p>Colete as estrelas · evite os inimigos</p>
    <button id="startBtn">▶ JOGAR</button>
  </div>
</div>
<div id="controls">
  <div class="cb" id="bl">◀</div>
  <div class="cb" id="bj">▲</div>
  <div class="cb" id="br">▶</div>
</div>

// ── Input ──
const K = {};
document.addEventListener('keydown', e=>{ K[e.key]=true;  if([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault(); });
document.addEventListener('keyup',   e=>{ K[e.key]=false; });

['bl','br','bj'].forEach(id=>{
  const el=document.getElementById(id);
  const k=id==='bl'?'ArrowLeft':id==='br'?'ArrowRight':' ';
  el.addEventListener('pointerdown',  e=>{ K[k]=true;  e.preventDefault(); });
  ['pointerup','pointerleave','pointercancel'].forEach(ev=>el.addEventListener(ev,()=>K[k]=false));
});

// ── State ──
let gameState='menu', score=0, lives=3, level=1, tick=0;
let player, platforms, stars, enemies;

// ── Platform layout ──
function mkPlatforms(){
  return [
    // ground (3 segments with small gaps so player can fall off edge)
    {x:0,   y:290, w:210, h:50},
    {x:230, y:290, w:210, h:50},
    {x:460, y:290, w:220, h:50},
    // mid level
    {x:55,  y:225, w:110, h:14},
    {x:270, y:205, w:130, h:14},
    {x:490, y:218, w:115, h:14},
    // upper level
    {x:140, y:155, w:95,  h:14},
    {x:355, y:145, w:115, h:14},
    {x:560, y:160, w:105, h:14},
    // top level
    {x:20,  y:90,  w:100, h:14},
    {x:265, y:78,  w:135, h:14},
    {x:490, y:92,  w:135, h:14},
    // sky bridge
    {x:145, y:24,  w:375, h:14},
  ];
}

function mkStars(plats){
  return plats.map((p,i)=>({
    x: p.x + p.w/2 + (i%3-1)*14,
    y: p.y - 24,
    col: false,
    phase: i*0.7
  }));
}

function mkEnemies(lvl){
  const spd = 0.9 + lvl*0.12;
  return [
    {x:80,  y:265, w:28,h:24, vx:spd,   dir:1, min:5,   max:195},
    {x:310, y:265, w:28,h:24, vx:spd*1.1,dir:1,min:235, max:415},
    {x:510, y:265, w:28,h:24, vx:spd*0.9,dir:1,min:465, max:655},
    {x:300, y:180, w:26,h:22, vx:spd,   dir:1, min:275, max:375},
    {x:520, y:193, w:26,h:22, vx:spd*0.85,dir:1,min:495,max:580},
  ];
}

function initGame(){
  platforms = mkPlatforms();
  stars     = mkStars(platforms);
  enemies   = mkEnemies(level);
  spawnPlayer();
}

function spawnPlayer(){
  // Find ground platform and place player on top
  const ground = platforms[0];
  player = {
    x: ground.x + 30,
    y: ground.y - 70,          // positioned so feet touch platform
    w: 44,                      // hitbox width (narrower than sprite)
    h: 60,                      // hitbox height
    vx: 0, vy: 0,
    onGround: false,
    dir: 1,                     // 1=right, -1=left
    anim: 'idle',
    animFrame: 0,
    animTick: 0,
    inv: 0,                     // invincibility frames after hit
    hurt: 0,
  };
}

// ── AABB collision ──
function rr(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }

// ── Update ──
function update(){
  if(gameState!=='play') return;
  tick++;

  const left  = K['ArrowLeft'] ||K['a']||K['A'];
  const right = K['ArrowRight']||K['d']||K['D'];
  const jump  = K[' ']||K['ArrowUp']||K['w']||K['W'];
  const run   = right||left;

  // Horizontal movement
  if(left){
    player.vx = -RUN_SPD;
    player.dir = -1;
  } else if(right){
    player.vx = RUN_SPD;
    player.dir = 1;
  } else {
    player.vx *= 0.65;
    if(Math.abs(player.vx)<0.2) player.vx=0;
  }

  // Jump
  if(jump && player.onGround){
    player.vy = JUMP_FORCE;
    player.onGround = false;
  }

  // Gravity
  player.vy += GRAVITY;
  if(player.vy > 14) player.vy = 14; // terminal velocity

  // Move X then resolve
  player.x += player.vx;
  player.x = Math.max(0, Math.min(W - player.w, player.x));

  // Move Y then resolve platforms
  player.y += player.vy;
  player.onGround = false;
  for(const p of platforms){
    // Only resolve when falling onto top surface
    const prevBottom = player.y + player.h - player.vy;
    if(
      player.x + player.w > p.x + 4 &&
      player.x < p.x + p.w - 4 &&
      player.vy >= 0 &&
      prevBottom <= p.y + 4 &&
      player.y + player.h >= p.y &&
      player.y + player.h <= p.y + p.h * 0.6
    ){
      player.y = p.y - player.h;
      player.vy = 0;
      player.onGround = true;
    }
    // Side/bottom collisions with thick platforms (ground segments)
    else if(p.h > 20 && rr(player, p)){
      // Push out from the nearest side
      const overlapL = (player.x + player.w) - p.x;
      const overlapR = (p.x + p.w) - player.x;
      const overlapT = (player.y + player.h) - p.y;
      const overlapB = (p.y + p.h) - player.y;
      const minO = Math.min(overlapL, overlapR, overlapT, overlapB);
      if(minO === overlapT && player.vy >= 0){
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      } else if(minO === overlapB && player.vy < 0){
        player.y = p.y + p.h;
        player.vy = 0;
      } else if(minO === overlapL){
        player.x = p.x - player.w;
        player.vx = 0;
      } else if(minO === overlapR){
        player.x = p.x + p.w;
        player.vx = 0;
      }
    }
  }

  // Fell off screen
  if(player.y > H + 20) loseLife();

  // Animation state
  if(player.hurt > 0){
    player.anim = 'hurt';
    player.hurt--;
  } else if(!player.onGround){
    player.anim = player.vy < 0 ? 'jump' : 'fall';
  } else if(Math.abs(player.vx) > 0.3){
    player.anim = 'run';
  } else {
    player.anim = 'idle';
  }

  // Advance animation frame
  const ad = ANIMS[player.anim];
  player.animTick++;
  if(player.animTick >= ad.spd){
    player.animTick = 0;
    player.animFrame = (player.animFrame + 1) % ad.frames.length;
  }
  if(player.inv > 0) player.inv--;

  // Collect stars
  for(const s of stars){
    if(!s.col &&
       player.x + player.w > s.x - 14 && player.x < s.x + 14 &&
       player.y + player.h > s.y - 14 && player.y < s.y + 14){
      s.col = true;
      score += 10;
      document.getElementById('esc').textContent = score;
    }
  }

  // Check level complete
  if(stars.every(s=>s.col)) nextLevel();

  // Enemy movement & collision
  for(const e of enemies){
    e.x += e.vx * e.dir;
    if(e.x <= e.min || e.x + e.w >= e.max) e.dir *= -1;
    if(player.inv === 0 && rr(player, e)) loseLife();
  }
}

function loseLife(){
  if(player.inv > 0) return;
  lives--;
  document.getElementById('elv').textContent = lives;
  player.inv  = 90;
  player.hurt = 30;
  player.vy   = -6;
  if(lives <= 0){ gameOver(); return; }
  // respawn after a moment
  setTimeout(()=>{
    spawnPlayer();
    player.inv = 60;
  }, 400);
}

function nextLevel(){
  level++;
  document.getElementById('enl').textContent = level;
  score += 50 + level * 10;
  document.getElementById('esc').textContent = score;
  enemies = mkEnemies(level);
  stars   = mkStars(platforms);
  spawnPlayer();
}

function gameOver(){
  gameState = 'menu';
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  ov.innerHTML = `
    <h2 style="color:#f0c040;font-size:26px;margin-bottom:10px;letter-spacing:2px;">FIM DE JOGO</h2>
    <p style="color:#ccc;font-size:14px;margin:4px 0;">Pontuação final: <strong>${score}</strong></p>
    <p style="color:#aaa;font-size:13px;margin:3px 0;">Nível alcançado: ${level}</p>
    <button id="startBtn" style="margin-top:18px;background:#f0c040;color:#1a1a2e;border:none;padding:11px 36px;font-size:15px;font-family:monospace;font-weight:700;border-radius:8px;cursor:pointer;letter-spacing:1px;">▶ JOGAR NOVAMENTE</button>`;
  document.getElementById('startBtn').addEventListener('click', startGame);
}

function startGame(){
  score=0; lives=3; level=1;
  document.getElementById('esc').textContent=0;
  document.getElementById('elv').textContent=3;
  document.getElementById('enl').textContent=1;
  initGame();
  document.getElementById('overlay').style.display='none';
  gameState='play';
}

// ── Draw ──
function drawBG(){
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#070514'); g.addColorStop(0.5,'#110d2e'); g.addColorStop(1,'#1a1035');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // stars
  for(let i=0;i<55;i++){
    const sx=(i*173+7)%W, sy=(i*97+3)%(H*0.72);
    const br=(Math.sin(tick*0.02+i)*0.35+0.65);
    ctx.fillStyle=`rgba(255,255,255,${0.4*br})`;
    ctx.fillRect(sx,sy,i%7===0?2:1,i%7===0?2:1);
  }
  // distant hills
  ctx.fillStyle='rgba(40,20,80,0.5)';
  ctx.beginPath(); ctx.moveTo(0,H);
  for(let x=0;x<=W;x+=40){
    const y=H-60-Math.sin(x*0.025)*35-Math.sin(x*0.013)*20;
    ctx.lineTo(x,y);
  }
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
}

function drawPlatforms(){
  for(const p of platforms){
    // body
    const isGround = p.h > 20;
    ctx.fillStyle = isGround ? '#3a2010' : '#5a3820';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    // top grass
    ctx.fillStyle = '#3d7a2a';
    ctx.fillRect(p.x, p.y, p.w, 5);
    ctx.fillStyle = '#52a838';
    ctx.fillRect(p.x+2, p.y, p.w-4, 2);
    // highlight
    ctx.fillStyle='rgba(255,255,255,0.07)';
    ctx.fillRect(p.x+3, p.y+7, p.w-6, 1);
    // brick pattern on ground
    if(isGround){
      ctx.fillStyle='rgba(0,0,0,0.18)';
      for(let bx=p.x+6;bx<p.x+p.w-6;bx+=22){
        ctx.fillRect(bx, p.y+10, 16, 8);
        ctx.fillRect(bx+11, p.y+22, 16, 8);
      }
    }
  }
}

function drawStars(){
  for(const s of stars){
    if(s.col) continue;
    const bob = Math.sin(tick*0.07 + s.phase)*3;
    ctx.save(); ctx.translate(s.x, s.y+bob);
    // glow
    const glow=ctx.createRadialGradient(0,0,0,0,0,15);
    glow.addColorStop(0,'rgba(255,215,50,0.4)'); glow.addColorStop(1,'rgba(255,215,50,0)');
    ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(0,0,15,0,Math.PI*2); ctx.fill();
    // star shape
    ctx.fillStyle='#f0c040';
    ctx.beginPath();
    for(let i=0;i<5;i++){
      const a=(i*4*Math.PI/5)-Math.PI/2, b=a+Math.PI/5;
      i===0?ctx.moveTo(Math.cos(a)*9,Math.sin(a)*9):ctx.lineTo(Math.cos(a)*9,Math.sin(a)*9);
      ctx.lineTo(Math.cos(b)*4,Math.sin(b)*4);
    }
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }
}

function drawEnemies(){
  for(const e of enemies){
    const b = Math.abs(Math.sin(tick*0.18))*2.5;
    ctx.save(); ctx.translate(e.x+e.w/2, e.y+e.h/2 - b);
    // body
    ctx.fillStyle='#c03030';
    ctx.beginPath(); ctx.arc(0,1,e.w/2,0,Math.PI*2); ctx.fill();
    // face highlight
    ctx.fillStyle='#e05050';
    ctx.beginPath(); ctx.arc(0,-2,e.w/2-3,Math.PI,0); ctx.fill();
    // eyes
    const ex=e.dir>0?3.5:-3.5;
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(ex-4,-4,3.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex+4,-4,3.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#111';
    ctx.beginPath(); ctx.arc(ex-4+e.dir*0.8,-4,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex+4+e.dir*0.8,-4,2,0,Math.PI*2); ctx.fill();
    // mouth angry
    ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(-5,5); ctx.lineTo(5,5); ctx.stroke();
    ctx.restore();
  }
}

function drawPlayer(){
  const p = player;
  // Blink when invincible
  if(p.inv > 0 && Math.floor(tick/4)%2===0) return;

  const ad = ANIMS[p.anim];
  const row = ROWS[ad.row];
  const colIdx = ad.frames[p.animFrame % ad.frames.length];
  const sx = COL_X[colIdx];
  const sy = row.y;
  const sw = COL_W;
  const sh = row.h;

  // Draw sprite centered on hitbox, scaled to match hitbox height roughly
  const drawH = sh;          // keep original sprite height
  const drawW = sw;          // keep original sprite width
  // Align sprite bottom with hitbox bottom
  const drawX = p.x + p.w/2 - drawW/2;
  const drawY = p.y + p.h - drawH;   // bottom of hitbox = bottom of sprite

  ctx.save();
  if(p.dir < 0){
    // Flip horizontally around center of sprite
    ctx.translate(drawX + drawW/2, 0);
    ctx.scale(-1, 1);
    ctx.translate(-(drawX + drawW/2), 0);
  }
  ctx.drawImage(sprite, sx, sy, sw, sh, drawX, drawY, drawW, drawH);
  ctx.restore();

  // Debug hitbox (remove in prod)
  // ctx.strokeStyle='rgba(255,0,0,0.5)'; ctx.lineWidth=1;
  // ctx.strokeRect(p.x,p.y,p.w,p.h);
}

function draw(){
  ctx.clearRect(0,0,W,H);
  drawBG();
  drawPlatforms();
  drawStars();
  drawEnemies();
  if(sprite.complete && sprite.naturalWidth > 0) drawPlayer();
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

document.getElementById('startBtn').addEventListener('click', startGame);
initGame();
loop();
</script>
